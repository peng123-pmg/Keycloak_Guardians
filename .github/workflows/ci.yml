name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Theme/package-lock.json

      - name: Build backend
        run: |
          chmod +x keycloak-server/gradlew
          ./keycloak-server/gradlew -p keycloak-server build -x test

      - name: Build frontend
        run: |
          cd Theme
          npm ci
          npm run build

      - name: Docker build backend
        run: docker build -t keycloak-guardians-backend ./keycloak-server

      - name: Docker build frontend
        run: docker build -t keycloak-guardians-frontend ./Theme

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag images
        if: github.event_name == 'push'
        run: |
          docker tag keycloak-guardians-backend ${{ secrets.DOCKERHUB_USERNAME }}/keycloak-guardians-backend:latest
          docker tag keycloak-guardians-frontend ${{ secrets.DOCKERHUB_USERNAME }}/keycloak-guardians-frontend:latest

      - name: Push images
        if: github.event_name == 'push'
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/keycloak-guardians-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/keycloak-guardians-frontend:latest
